[project]
name = "time-analysis"
version = "0.1.0"
description = "Data analysis of time sequences"
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.13"

dependencies = [
    # Core data
    "numpy>=2.0",
    "pandas>=2.0",
    # Machine Learning
    "scikit-learn>=1.5",
    # Deep Learning
    "torch>=2.3",
    # Digital Signal Processing
    "scipy>=1.13",
    # Visualization
    "matplotlib>=3.9",
    "seaborn>=0.13",
    "plotly>=5.22",
]

[dependency-groups]
dev = [
    "ruff>=0.11",
    "pytest>=8.0",
    "ipykernel>=6.0",
    "mkdocs-material>=9.7.6",
    "mkdocs>=1.6.1",
    "nbformat",
    "nbclient",
    "jupyter-cache",
]

[tool.ruff]
target-version = "py313"
line-length = 88

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = ["E501"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["."]
