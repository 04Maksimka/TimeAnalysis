project:
  type: website
  output-dir: _site
  render:
    - index.qmd
    - about.qmd
    - model-strategies.qmd
    - educational.qmd
    - project-infrastructure.qmd
    - exploratory-data-analysis.qmd
    - "posts/model-strategies/*.ipynb"
    - "posts/educational/tutorials/*.ipynb"
    - "posts/educational/related-topics/*.ipynb"
    - "posts/educational/related-topics/*/*.ipynb"
    - "posts/project-infrastructure/*.ipynb"
    - "posts/exploratory-data-analysis/*.ipynb"
    - "posts/model-strategies/*.qmd"
    - "posts/educational/tutorials/*.qmd"
    - "posts/educational/related-topics/*.qmd"
    - "posts/educational/related-topics/*/*.qmd"
    - "posts/project-infrastructure/*.qmd"
    - "posts/exploratory-data-analysis/*.qmd"
  resources:
    - "assets/**"

website:
  title: "TimeAnalysis Research"
  site-url: "https://04Maksimka.github.io/TimeAnalysis/"
  description: "Public research notebooks for the TimeAnalysis project."
  repo-url: "https://github.com/04Maksimka/TimeAnalysis"
  repo-actions: [source, issue]
  navbar:
    left:
      - href: index.qmd
        text: Categories
      - href: model-strategies.qmd
        text: "Models & Strategies"
      - href: educational.qmd
        text: "Educational"
      - href: project-infrastructure.qmd
        text: "Infrastructure"
      - href: exploratory-data-analysis.qmd
        text: "EDA"
      - href: about.qmd
        text: About
    right:
      - icon: github
        href: "https://github.com/04Maksimka/TimeAnalysis"
        aria-label: GitHub

execute:
  enabled: false

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    code-fold: true
    code-tools: true
