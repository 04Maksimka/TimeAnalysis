      <path d="M546 250L546 141"/>
    </g>

    <g stroke="#202020" stroke-width="2.4" stroke-opacity="0.55">
      <path d="M126 300L620 267"/>
      <path d="M126 300L268 185"/>
      <path d="M126 300L126 96"/>
      <path d="M620 267L646 253M620 267L643 283"/>
      <path d="M268 185L291 178M268 185L281 205"/>
      <path d="M126 96L118 119M126 96L136 119"/>
    </g>

    <g stroke="#303030" stroke-width="1" stroke-opacity="0.22">
      <path d="M228 262C285 204 399 172 508 192C573 204 618 232 626 262"/>
      <path d="M232 281C302 236 430 220 540 246"/>
      <path d="M204 244C297 296 449 304 575 262"/>
      <path d="M256 210C352 258 501 270 616 228"/>
