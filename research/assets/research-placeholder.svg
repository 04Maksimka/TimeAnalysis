    <ellipse cx="421" cy="230" rx="178" ry="58" fill="url(#hatch)" stroke="#2a2a2a" stroke-width="1.4" stroke-opacity="0.22" transform="rotate(-12 421 230)"/>
  </g>

  <g filter="url(#soft-pencil)" fill="#252525" fill-opacity="0.42" stroke="#111" stroke-opacity="0.18">
