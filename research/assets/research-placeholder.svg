<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-labelledby="title desc">
  <title id="title">Pencil sketch research placeholder</title>
  <desc id="desc">A grayscale pencil-style component cloud drawn on paper.</desc>
  <defs>
    <filter id="paper" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" seed="7" result="noise"/>
      <feColorMatrix in="noise" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="soft-pencil" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" seed="12" result="grain"/>
      <feDisplacementMap in="SourceGraphic" in2="grain" scale="1.2"/>
      <feGaussianBlur stdDeviation="0.18"/>
    </filter>
    <pattern id="hatch" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(-28)">
      <path d="M0 6H12" stroke="#343434" stroke-width="0.7" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="720" height="400" fill="#f7f5ef"/>
  <rect width="720" height="400" filter="url(#paper)" opacity="0.55"/>

  <g filter="url(#soft-pencil)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#282828" stroke-width="1.2" stroke-opacity="0.18">
      <path d="M126 300L360 352L616 266"/>
      <path d="M126 300L126 98"/>
