project:
  type: website
  output-dir: _site

website:
  title: "TimeAnalysis"
  description: |
    A research journal on building an automated trading system —
    covering signal processing, ML/DL algorithms, and market analysis.

  favicon: assets/favicon.ico
  page-navigation: true
  back-to-top-navigation: true

  repo-url: https://github.com/04Maksimka/timeanalysis
  repo-actions: [edit, issue]

  sidebar:
    style: docked
    background: light
    search: true
    contents:
      - index.qmd
      - section: "Quick Start"
        contents:
          - quickstart/index.qmd
          - quickstart/setup.qmd
      - section: "Algorithms"
        contents:
          - algorithms/index.qmd
          - algorithms/fourier.qmd
          - algorithms/moving_average.qmd
      - section: "Research"
        contents:
          - research/index.qmd
          - research/signal_analysis/fourier_transform.qmd
      - appendix/references.qmd

  navbar:
    background: primary
    search: true
    right:
      - icon: github
        href: https://github.com/04Maksimka/timeanalysis

format:
  html:
    theme: cosmo
    code-link: true
    code-copy: true
    code-fold: false
    toc: true
    toc-depth: 3
    number-sections: false
    highlight-style: github
    fig-align: center
    html-math-method: katex

execute:
  python: .venv/Scripts/python.exe
  freeze: auto
  echo: true
  warning: false
  cache: true